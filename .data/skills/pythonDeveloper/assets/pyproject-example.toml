# pyproject.toml — Python project template
# Adapt build-system and package manager to your project

[build-system]
requires = ["hatchling"]            # or: setuptools, poetry-core, flit-core, maturin
build-backend = "hatchling.build"   # or: setuptools.build_meta, poetry.core.masonry.api

[project]
name = "your-project"
version = "0.1.0"
description = "Project description"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Your Name", email = "you@example.com" }]
dependencies = [
    # Web framework (pick one):
    # "fastapi>=0.115",
    # "flask>=3.1",
    # "django>=5.1",

    # Data validation:
    # "pydantic>=2.10",

    # HTTP client:
    # "httpx>=0.28",

    # Database:
    # "sqlalchemy>=2.0",
    # "alembic>=1.14",

    # CLI:
    # "click>=8.1",
    # "typer>=0.15",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.9",
    "mypy>=1.14",
    "pip-audit>=2.7",
    "pre-commit>=4.0",
]

[project.scripts]
your-project = "your_project.main:main"
# or: your-project = "your_project.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/your_project"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "T20"]
# E = pycodestyle, F = pyflakes, I = isort, N = pep8-naming
# W = pycodestyle warnings, UP = pyupgrade, B = bugbear
# SIM = simplify, T20 = flake8-print (no print statements)

[tool.ruff.lint.isort]
known-first-party = ["your_project"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.coverage.run]
source = ["src/your_project"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 80
