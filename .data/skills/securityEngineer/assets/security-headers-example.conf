# Security Headers Configuration Template
# Apply to nginx, Apache, or Express reverse proxy if NiceGUI is network-exposed

# --- Nginx ---
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
# add_header X-Frame-Options "SAMEORIGIN" always;
# add_header X-Content-Type-Options "nosniff" always;
# add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
# add_header X-XSS-Protection "0";  # Deprecated, CSP replaces this

# --- Apache ---
# Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"
# Header always set X-Frame-Options "SAMEORIGIN"
# Header always set X-Content-Type-Options "nosniff"
# Header always set Referrer-Policy "strict-origin-when-cross-origin"

