name: Bump Version & Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Version bump type"
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

jobs:
    bump:
        name: Bump ${{ inputs.bump }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: github.ref == 'refs/heads/main'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get current version
              id: current
              run: |
                  VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Current version: $VERSION"

            - name: Calculate next version
              id: next
              run: |
                  IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
                  case "${{ inputs.bump }}" in
                      major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                      minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                      patch) PATCH=$((PATCH + 1)) ;;
                  esac
                  NEXT="${MAJOR}.${MINOR}.${PATCH}"
                  echo "version=$NEXT" >> "$GITHUB_OUTPUT"
                  echo "Next version: $NEXT"

            - name: Update pyproject.toml
              run: |
                  sed -i "s/^version = \".*\"/version = \"${{ steps.next.outputs.version }}\"/" pyproject.toml
                  echo "Updated pyproject.toml:"
                  grep '^version' pyproject.toml

            - name: Roll changelog Unreleased section
              run: |
                  VERSION="${{ steps.next.outputs.version }}"
                  TODAY=$(date -u +%Y-%m-%d)
                  if grep -q '^## \[Unreleased\]' CHANGELOG.md; then
                      sed -i "s/^## \[Unreleased\]/## [${VERSION}] - ${TODAY}/" CHANGELOG.md
                      echo "Renamed [Unreleased] to [${VERSION}] - ${TODAY}"
                  else
                      echo "No [Unreleased] section — CHANGELOG.md left untouched"
                  fi

            - name: Commit version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add pyproject.toml CHANGELOG.md
                  git commit -m "chore: bump version to ${{ steps.next.outputs.version }}"
                  git push

            - name: Create and push tag
              run: |
                  git tag "v${{ steps.next.outputs.version }}"
                  git push origin "v${{ steps.next.outputs.version }}"
                  echo "Tagged: v${{ steps.next.outputs.version }}"

            - name: Create GitHub Release
              id: release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="${{ steps.next.outputs.version }}"
                  # Extract this version's CHANGELOG section (between its heading
                  # and the next "## [" heading), dropping leading blank lines.
                  awk -v ver="$VERSION" '
                      BEGIN { gsub(/\./, "\\.", ver) }
                      $0 ~ "^## \\[" ver "\\]" { found=1; next }
                      found && /^## \[/ { exit }
                      found { print }
                  ' CHANGELOG.md | sed -e '/./,$!d' > "$RUNNER_TEMP/release-notes.md"
                  if [ -s "$RUNNER_TEMP/release-notes.md" ]; then
                      URL=$(gh release create "v${VERSION}" --title "v${VERSION}" \
                          --notes-file "$RUNNER_TEMP/release-notes.md")
                  else
                      echo "No CHANGELOG section for ${VERSION} — using generated notes"
                      URL=$(gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes)
                  fi
                  echo "url=$URL" >> "$GITHUB_OUTPUT"
                  echo "Released: $URL"

            - name: Summary
              run: |
                  echo "### Version Bumped" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| | |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Type** | ${{ inputs.bump }} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Previous** | ${{ steps.current.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **New** | ${{ steps.next.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Tag** | v${{ steps.next.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Release** | ${{ steps.release.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
