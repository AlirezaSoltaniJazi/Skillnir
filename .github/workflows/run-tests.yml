name: PR - Run Tests

on: [pull_request]

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python
              uses: ./.github/actions/setup-python

            - name: Install dependencies
              run: |
                  pip install -e ".[dev]"

            - name: Run tests
              run: pytest --tb=short -q
