<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 30">
  <rect width="40" height="30" fill="#E41E20"/>
  <!-- Double-headed eagle -->
  <g transform="translate(20,15)" fill="#000">
    <!-- Body -->
    <ellipse cx="0" cy="1" rx="2" ry="3"/>
    <!-- Left head and neck -->
    <path d="M-1 -1Q-2 -3 -3.5 -4.5L-3 -5L-2.5 -4Q-1.5 -2.5 -0.5 -1.5Z"/>
    <!-- Right head and neck -->
    <path d="M1 -1Q2 -3 3.5 -4.5L3 -5L2.5 -4Q1.5 -2.5 0.5 -1.5Z"/>
    <!-- Left beak -->
    <path d="M-3.5 -4.5L-4.5 -4.2L-3 -5Z"/>
    <!-- Right beak -->
    <path d="M3.5 -4.5L4.5 -4.2L3 -5Z"/>
    <!-- Left wing -->
    <path d="M-2 0Q-5 -1 -6.5 0Q-5.5 0.5 -5 1Q-4.5 0 -4 0.5Q-3.5 -0.5 -3 0Q-2.5 -0.5 -2 0Z"/>
    <!-- Right wing -->
    <path d="M2 0Q5 -1 6.5 0Q5.5 0.5 5 1Q4.5 0 4 0.5Q3.5 -0.5 3 0Q2.5 -0.5 2 0Z"/>
    <!-- Tail feathers -->
    <path d="M-1 3.5L0 5L1 3.5Q0.5 4 0 3.8Q-0.5 4 -1 3.5Z"/>
    <!-- Feet -->
    <path d="M-1 4L-1.5 5.5M-0.5 4L-0.5 5.5M1 4L1.5 5.5M0.5 4L0.5 5.5" stroke="#000" stroke-width="0.3" fill="none"/>
  </g>
</svg>
