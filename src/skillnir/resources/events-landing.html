<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Events &amp; Conferences</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --text: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --hover: #f1f5f9;
      --link: #6366f1;
      --link-hover: #4f46e5;
      --chip-active-border: #1e293b;
      --chip-active-shadow: rgba(0,0,0,0.1);
    }
    [data-theme="dark"] {
      --bg: #0f0f17;
      --surface: #1a1a2e;
      --surface-alt: #12121e;
      --text: #e2e8f0;
      --text-secondary: #cbd5e1;
      --text-muted: #6b7280;
      --border: #1e1e36;
      --hover: #22223a;
      --link: #818cf8;
      --link-hover: #a5b4fc;
      --chip-active-border: #fff;
      --chip-active-shadow: rgba(255,255,255,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 2.5rem; font-weight: 700;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
      margin-top: 8px;
    }
    .theme-toggle:hover { background: var(--hover); }
    .subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 15px; }
    .filter-section { margin-bottom: 16px; }
    .filter-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 8px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; margin-top: 16px; }
    thead th { text-align: left; padding: 12px 16px; background: var(--surface-alt); color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text); }
    .sort-arrow { margin-left: 4px; font-size: 11px; }
    .row { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .row:hover { background: var(--hover); }
    .row td { padding: 12px 16px; font-size: 14px; }
    .row td a { color: var(--link); text-decoration: none; font-weight: 500; }
    .row td a:hover { color: var(--link-hover); text-decoration: underline; }
    .chip {
      display: inline-block; padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      border: 1px solid transparent;
    }
    .chip:hover { opacity: 1 !important; transform: translateY(-1px); }
    .chip.active { opacity: 1 !important; border-color: var(--chip-active-border); box-shadow: 0 0 0 1px var(--chip-active-shadow); }
    .topic-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
    }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('skillnir-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>AI Events &amp; Conferences</h1>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    </div>
    <p class="subtitle"><!-- SUBTITLE --></p>
    <div class="filter-section">
      <div class="filter-label">Topics</div>
      <div class="stats"><!-- TOPIC_CHIPS --></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Countries</div>
      <div class="stats"><!-- COUNTRY_CHIPS --></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Price</div>
      <div class="stats"><!-- FREE_CHIPS --></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Event</th>
          <th class="sortable" onclick="toggleDateSort()">Date <span class="sort-arrow" id="sortArrow">&#x25b2;</span></th>
          <th>Location</th>
          <th>Country</th>
          <th>Topic</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
<!-- TABLE_ROWS -->
      </tbody>
    </table>
  </div>
  <script>
    const activeTopics = new Set();
    const activeCountries = new Set();
    const activeFree = new Set();
    let sortAsc = true;
    const TOTAL_EVENTS = <!-- TOTAL_EVENTS -->;

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('skillnir-theme', next);
      updateToggleIcon();
    }
    function updateToggleIcon() {
      var btn = document.querySelector('.theme-toggle');
      btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }
    updateToggleIcon();

    function toggleTopic(topic) {
      const allChip = document.querySelector('.topic-chip[data-filter="all"]');
      if (topic === 'all') {
        activeTopics.clear();
        document.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('active'));
        allChip.classList.add('active');
      } else {
        allChip.classList.remove('active');
        if (activeTopics.has(topic)) {
          activeTopics.delete(topic);
        } else {
          activeTopics.add(topic);
        }
        const chip = document.querySelector('.topic-chip[data-filter="' + CSS.escape(topic) + '"]');
        if (chip) chip.classList.toggle('active');
        if (activeTopics.size === 0) {
          allChip.classList.add('active');
        }
      }
      applyFilters();
    }

    function toggleCountry(country) {
      const allChip = document.querySelector('.country-chip[data-filter="all"]');
      if (country === 'all') {
        activeCountries.clear();
        document.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
        allChip.classList.add('active');
      } else {
        allChip.classList.remove('active');
        if (activeCountries.has(country)) {
          activeCountries.delete(country);
        } else {
          activeCountries.add(country);
        }
        const chip = document.querySelector('.country-chip[data-filter="' + CSS.escape(country) + '"]');
        if (chip) chip.classList.toggle('active');
        if (activeCountries.size === 0) {
          allChip.classList.add('active');
        }
      }
      applyFilters();
    }

    function toggleFree(filter) {
      const allChip = document.querySelector('.free-chip[data-filter="all"]');
      if (filter === 'all') {
        activeFree.clear();
        document.querySelectorAll('.free-chip').forEach(c => c.classList.remove('active'));
        allChip.classList.add('active');
      } else {
        allChip.classList.remove('active');
        if (activeFree.has(filter)) {
          activeFree.delete(filter);
        } else {
          activeFree.add(filter);
        }
        const chip = document.querySelector('.free-chip[data-filter="' + CSS.escape(filter) + '"]');
        if (chip) chip.classList.toggle('active');
        if (activeFree.size === 0) {
          allChip.classList.add('active');
        }
      }
      applyFilters();
    }

    function applyFilters() {
      const rows = document.querySelectorAll('tr.row');
      const subtitle = document.querySelector('.subtitle');
      let visible = 0;
      rows.forEach(row => {
        const topicMatch = activeTopics.size === 0 || activeTopics.has(row.dataset.topic);
        const countryMatch = activeCountries.size === 0 || activeCountries.has(row.dataset.country);
        const freeMatch = activeFree.size === 0 || activeFree.has(row.dataset.free);
        if (topicMatch && countryMatch && freeMatch) {
          row.style.display = '';
          visible++;
        } else {
          row.style.display = 'none';
        }
      });
      subtitle.textContent = visible + ' of ' + TOTAL_EVENTS + ' events';
    }

    function toggleDateSort() {
      sortAsc = !sortAsc;
      document.getElementById('sortArrow').textContent = sortAsc ? '\u25b2' : '\u25bc';
      const tbody = document.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr.row'));
      rows.sort((a, b) => {
        const da = a.dataset.date || '';
        const db = b.dataset.date || '';
        return sortAsc ? da.localeCompare(db) : db.localeCompare(da);
      });
      rows.forEach(row => tbody.appendChild(row));
    }
  </script>
</body>
</html>
